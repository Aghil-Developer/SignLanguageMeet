<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – MOUNA</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/themes.css">
</head>
<body>
  <section class="page-hero">
    <div class="container">
      <h1>Get in <span class="gradient-text">Touch</span></h1>
      <p>Have questions, feedback, or want to collaborate? We'd love to hear from you.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="contact-form">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" placeholder="Enter your name" id="contactName">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" id="contactEmail">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" placeholder="What's this about?" id="contactSubject">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea placeholder="Tell us more..." id="contactMessage"></textarea>
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="submitContact()">Send Message</button>
      </div>
    </div>
  </section>

  <script src="/components/navbar.js"></script>
  <script src="/components/footer.js"></script>
  <script src="/scripts/app.js"></script>
  <script>
    renderNavbar('contact');
    renderFooter();

    function submitContact() {
      const name = document.getElementById('contactName').value.trim();
      const email = document.getElementById('contactEmail').value.trim();
      if (!name || !email) {
        alert('Please fill in your name and email.');
        return;
      }
      alert('Thank you for reaching out! We will get back to you soon.');
      document.getElementById('contactName').value = '';
      document.getElementById('contactEmail').value = '';
      document.getElementById('contactSubject').value = '';
      document.getElementById('contactMessage').value = '';
    }
  </script>
</body>
</html>
