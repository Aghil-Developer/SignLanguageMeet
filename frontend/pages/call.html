<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Room – MOUNA</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/themes.css">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div class="call-page">
    <div class="call-setup" id="callSetup">
      <div class="call-setup-card">
        <h2>&#128222; Video Call</h2>
        <p class="subtitle">Create a new room or join with a Room ID</p>

        <button class="btn btn-primary" style="width:100%; margin-bottom: 16px;" onclick="handleCreateRoom()">
          &#9654; Create New Room
        </button>

        <div class="divider">or join existing</div>

        <div class="input-group">
          <input type="text" id="roomIdInput" placeholder="Enter Room ID" maxlength="20" autocomplete="off">
        </div>
        <button class="btn btn-secondary" style="width:100%;" onclick="handleJoinRoom()">
          &#128279; Join Room
        </button>

        <div id="roomInfo" style="margin-top: 20px; display: none;">
          <p style="color: var(--accent-light); font-size: 0.9rem;">Room ID: <strong id="displayRoomId"></strong></p>
          <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 4px;">Share this ID with others to join</p>
          <div class="invite-link-preview" id="inviteLinkPreview"></div>
          <div class="invite-actions">
            <button class="btn btn-secondary btn-sm" type="button" onclick="copyInviteLink()">Copy Link</button>
            <button class="btn btn-secondary btn-sm" type="button" onclick="shareWhatsApp()">WhatsApp</button>
            <button class="btn btn-secondary btn-sm" type="button" onclick="shareEmail()">Email</button>
            <button class="btn btn-primary btn-sm" type="button" onclick="shareNative()">Share</button>
          </div>
        </div>
      </div>
    </div>

    <div class="call-interface" id="callInterface">
      <div class="call-topbar">
        <div class="call-room-code">Room Code: <strong id="topRoomCode">-</strong></div>
        <button class="btn btn-primary btn-sm" type="button" id="topShareBtn">Share</button>
      </div>

      <div class="video-grid" id="videoGrid">
        <div class="video-container">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="video-label">You</div>
        </div>
        <div class="video-container" id="waitingTile">
          <div class="video-placeholder" id="remotePlaceholder">
            <div class="avatar">&#128100;</div>
            <span>Waiting for participants to join...</span>
          </div>
          <div class="video-label">Room</div>
        </div>
      </div>

      <div class="subtitles-panel" id="subtitlesPanel">
        <div class="subtitle-lang-select">
          <span id="sttStatus" style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600;background:#666;color:#fff;margin-right:8px;">STT: OFF</span>
          <label>Subtitles:</label>
          <select id="subtitleLang">
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="ta">Tamil</option>
            <option value="ml">Malayalam</option>
          </select>
        </div>
        <div class="subtitle-content" id="subtitleContent">
          <div class="subtitle-line" style="color: var(--text-muted);">Subtitles will appear here when speech is detected...</div>
        </div>
      </div>

      <div class="call-controls">
        <button class="btn-icon" id="btnMute" title="Toggle Microphone">&#127908;</button>
        <button class="btn-icon" id="btnCamera" title="Toggle Camera">&#128247;</button>
        <button class="btn-icon sign-mode-btn" id="btnSign" title="Sign Language Mode">&#9995;</button>
        <button class="btn-icon btn-danger" id="btnLeave" title="Leave Call">&#128683;</button>
      </div>
    </div>
  </div>

  <script src="/components/navbar.js"></script>
  <script src="/components/signPlayer.js"></script>
  <script src="/scripts/app.js"></script>
  <script src="/scripts/videoCall.js"></script>
  <script src="/scripts/speechRecognition.js"></script>
  <script src="/scripts/videoMatcher.js"></script>
  <script src="/scripts/subtitles.js"></script>

  <script>
    renderNavbar('call');

    const videoCall = new VideoCall();
    const signPlayer = new SignPlayer();
    const videoMatcher = new VideoMatcher(signPlayer);
    const speechRecognizer = new SpeechRecognizer();
    const subtitleManager = new SubtitleManager('subtitlesPanel');
    let shareBaseUrl = window.location.origin;
    let shareModeLabel = 'local';
    let controlsBound = false;
    const remoteTiles = new Map();

    function safePeerId(rawPeerId) {
      return String(rawPeerId || '').replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function updateWaitingTile() {
      const waitingTile = document.getElementById('waitingTile');
      if (!waitingTile) return;
      waitingTile.style.display = remoteTiles.size > 0 ? 'none' : 'flex';
    }

    function addOrUpdateRemoteTile(peerId, stream) {
      if (!peerId || !stream) return;

      const videoGrid = document.getElementById('videoGrid');
      if (!videoGrid) return;

      const safeId = safePeerId(peerId);
      let tile = remoteTiles.get(peerId);
      if (!tile) {
        tile = document.createElement('div');
        tile.className = 'video-container';
        tile.id = `remoteTile-${safeId}`;
        tile.innerHTML = `
          <video autoplay playsinline></video>
          <div class="video-label">Peer ${safeId.slice(-4)}</div>
        `;
        videoGrid.appendChild(tile);
        remoteTiles.set(peerId, tile);
      }

      const video = tile.querySelector('video');
      if (video) {
        video.srcObject = stream;
      }

      updateWaitingTile();
    }

    function removeRemoteTile(peerId) {
      const tile = remoteTiles.get(peerId);
      if (tile && tile.parentNode) {
        tile.parentNode.removeChild(tile);
      }
      remoteTiles.delete(peerId);
      updateWaitingTile();
    }

    videoMatcher.init();

    const urlParams = new URLSearchParams(window.location.search);
    const roomParam = urlParams.get('room');

    if (roomParam) {
      showRoomInfo(roomParam);
      startCall(roomParam, false);
    }

    loadShareBaseUrl();

    document.getElementById('topShareBtn').addEventListener('click', () => {
      shareNative();
    });

    async function loadShareBaseUrl() {
      try {
        const res = await fetch('/api/network-info');
        const info = await res.json();

        if (info && info.publicBaseUrl) {
          shareBaseUrl = info.publicBaseUrl;
          shareModeLabel = 'public';
        } else if (info && info.isLocalHost && info.lanBaseUrl) {
          shareBaseUrl = info.lanBaseUrl;
          shareModeLabel = 'lan';
        } else if (info && info.origin) {
          shareBaseUrl = info.origin;
          shareModeLabel = 'local';
        }

        const currentRoom = getCurrentRoomId();
        if (currentRoom) {
          showRoomInfo(currentRoom);
        }
      } catch (err) {
        shareBaseUrl = window.location.origin;
      }
    }

    function buildInviteLink(roomId) {
      return `${shareBaseUrl}/call?room=${encodeURIComponent(roomId)}`;
    }

    function showRoomInfo(roomId) {
      document.getElementById('displayRoomId').textContent = roomId;
      document.getElementById('topRoomCode').textContent = roomId;
      document.getElementById('roomInfo').style.display = 'block';
      const invite = buildInviteLink(roomId);
      const modeText = shareModeLabel === 'public'
        ? 'Public Share Link'
        : shareModeLabel === 'lan'
          ? 'Same Wi-Fi Share Link'
          : 'Local Link';
      const extraHint = shareModeLabel === 'public'
        ? ''
        : ' (Start ngrok for long-distance sharing)';
      document.getElementById('inviteLinkPreview').textContent = `${modeText}: ${invite}${extraHint}`;
    }

    function getCurrentRoomId() {
      const fromUrl = new URLSearchParams(window.location.search).get('room');
      if (fromUrl) return fromUrl;
      const fromLabel = document.getElementById('displayRoomId').textContent.trim();
      if (fromLabel) return fromLabel;
      const fromInput = document.getElementById('roomIdInput').value.trim();
      return fromInput || '';
    }

    async function copyInviteLink() {
      const roomId = getCurrentRoomId();
      if (!roomId) {
        alert('Create or enter a room first.');
        return;
      }
      const inviteLink = buildInviteLink(roomId);
      try {
        await navigator.clipboard.writeText(inviteLink);
        alert('Invite link copied. Share it with the other person.');
      } catch (err) {
        prompt('Copy this invite link:', inviteLink);
      }
    }

    function shareWhatsApp() {
      const roomId = getCurrentRoomId();
      if (!roomId) {
        alert('Create or enter a room first.');
        return;
      }
      const inviteLink = buildInviteLink(roomId);
      const msg = `Join my MOUNA call: ${inviteLink}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function shareEmail() {
      const roomId = getCurrentRoomId();
      if (!roomId) {
        alert('Create or enter a room first.');
        return;
      }
      const inviteLink = buildInviteLink(roomId);
      const subject = 'MOUNA Call Invitation';
      const bodyText = `Hi,\n\nJoin my MOUNA call using this link:\n${inviteLink}\n\nThanks!`;
      window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
    }

    async function shareNative() {
      const roomId = getCurrentRoomId();
      if (!roomId) {
        alert('Create or enter a room first.');
        return;
      }
      const inviteLink = buildInviteLink(roomId);
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'MOUNA Call Invitation',
            text: 'Join my MOUNA call',
            url: inviteLink
          });
          return;
        } catch (err) {
        }
      }
      prompt('Share this invite link:', inviteLink);
    }

    async function handleCreateRoom() {
      try {
        const res = await fetch('/api/room/create');
        const data = await res.json();
        const roomId = data.roomId;
        showRoomInfo(roomId);


        history.replaceState(null, '', `/call?room=${roomId}`);

        startCall(roomId, true);
      } catch (err) {
        alert('Failed to create room. Is the server running?');
      }
    }


    function handleJoinRoom() {
      const input = document.getElementById('roomIdInput');
      const roomId = input.value.trim();
      if (!roomId) {
        alert('Please enter a Room ID');
        return;
      }
      showRoomInfo(roomId);
      history.replaceState(null, '', `/call?room=${roomId}`);
      startCall(roomId, false);
    }


    async function startCall(roomId, isCreator) {
      document.getElementById('callSetup').style.display = 'none';
      document.getElementById('callInterface').classList.add('active');

      const success = await videoCall.init(roomId, isCreator);
      if (!success) {
        document.getElementById('callInterface').classList.remove('active');
        document.getElementById('callSetup').style.display = 'flex';
        return;
      }

      videoCall.onRemoteStreamAdded = (peerId, remoteStream) => {
        addOrUpdateRemoteTile(peerId, remoteStream);
      };

      videoCall.onRemoteStreamRemoved = (peerId) => {
        removeRemoteTile(peerId);
      };

    
      const sttBadge = document.getElementById('sttStatus');
      speechRecognizer.onStatusChange = (status) => {
        const labels = { listening: 'STT: LISTENING', restarting: 'STT: RESTARTING', stopped: 'STT: OFF', error: 'STT: ERROR' };
        const colors = { listening: '#2ecc40', restarting: '#ff851b', stopped: '#666', error: '#e74c3c' };
        sttBadge.textContent = labels[status] || status;
        sttBadge.style.background = colors[status] || '#666';
      };

      speechRecognizer.onError = (message) => {
        subtitleManager.addLine(`STT error: ${message}`, true, { confidence: 1 });
      };

      
      speechRecognizer.onResult = (text, isFinal, metadata) => {
        subtitleManager.addLine(text, isFinal, metadata);

        
        videoCall.sendData({
          type: 'subtitle',
          text,
          isFinal: !!isFinal,
          confidence: metadata && typeof metadata.confidence === 'number' ? metadata.confidence : 1
        });

       
        if (isFinal) {
          videoMatcher.processText(text);
        }
      };
      speechRecognizer.onWordDetected = (word) => {
        videoMatcher.processWord(word);
      };

      
      videoCall.onDataMessage = (payload, remotePeerId) => {
        if (!payload) return;

        if (payload.type === 'subtitle' && payload.text) {
          const shortPeer = safePeerId(remotePeerId || 'peer').slice(-4);
          const prefix = `Peer ${shortPeer}: `;
          subtitleManager.addLine(
            `${prefix}${payload.text}`,
            !!payload.isFinal,
            { confidence: typeof payload.confidence === 'number' ? payload.confidence : 1 }
          );
          return;
        }

        if (payload.type !== 'sign' || !payload.file) return;

        if (!signPlayer.isActive) {
          signPlayer.show();
          document.getElementById('btnSign').classList.add('active');
        }

        if (typeof signPlayer.enqueueVideoLocal === 'function') {
          signPlayer.enqueueVideoLocal({
            file: payload.file,
            label: payload.label || 'remote'
          });
        }
      };

      
      if (!signPlayer.__syncPatched) {
        const baseEnqueueVideo = signPlayer.enqueueVideo.bind(signPlayer);

        signPlayer.enqueueVideoLocal = (item) => {
          baseEnqueueVideo(item);
        };

        signPlayer.enqueueVideo = (item) => {
          signPlayer.enqueueVideoLocal(item);

          videoCall.sendData({
            type: 'sign',
            file: item && item.file ? item.file : '',
            label: item && item.label ? item.label : ''
          });
        };

        signPlayer.__syncPatched = true;
      }

      
      await videoMatcher.init();
      speechRecognizer.start();

    
      setupControls();
    }

    
    function setupControls() {
      if (controlsBound) return;
      controlsBound = true;

      const btnMute = document.getElementById('btnMute');
      const btnCamera = document.getElementById('btnCamera');
      const btnSign = document.getElementById('btnSign');
      const btnLeave = document.getElementById('btnLeave');
      const subtitleLang = document.getElementById('subtitleLang');

      btnMute.addEventListener('click', () => {
        const muted = videoCall.toggleMute();
        if (muted === null) {
          videoCall.requestMissingTrack('audio').then((ok) => {
            if (!ok) {
              alert('Microphone is unavailable. Please allow mic permission and try again.');
            } else {
              alert('Microphone connected. Click the mic button again to mute/unmute.');
            }
          });
          return;
        }
        btnMute.classList.toggle('active', muted);
        btnMute.innerHTML = muted ? '&#128263;' : '&#127908;';
      });

      btnCamera.addEventListener('click', () => {
        const off = videoCall.toggleCamera();
        if (off === null) {
          videoCall.requestMissingTrack('video').then((ok) => {
            if (!ok) {
              alert('Camera is unavailable. Please allow camera permission and try again.');
            } else {
              alert('Camera connected. Click the camera button again to turn it on/off.');
            }
          });
          return;
        }
        btnCamera.classList.toggle('active', off);
        btnCamera.innerHTML = off ? '&#128683;' : '&#128247;';
      });

      btnSign.addEventListener('click', () => {
        signPlayer.toggle();
        btnSign.classList.toggle('active', signPlayer.isActive);
      });

      btnLeave.addEventListener('click', () => {
        speechRecognizer.stop();
        videoCall.leaveCall();
      });

      subtitleLang.addEventListener('change', (e) => {
        const subtitleCode = e.target.value;
        subtitleManager.setLanguage(subtitleCode);

        const speechLangMap = {
          en: 'en-US',
          te: 'te-IN',
          ta: 'ta-IN',
          ml: 'ml-IN'
        };
        speechRecognizer.setLanguage(speechLangMap[subtitleCode] || 'en-US');
      });
    }
  </script>
</body>
</html>
